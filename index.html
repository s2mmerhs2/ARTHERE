<!DOCTYPE html>
<html lang="ko">
<head>
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=377f2d2821388f56ba124060c27ff5be"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARTHERE — 대학생 전시 탐색</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #2e1a33;
            --paper: #f5f9f0;
            --accent: #58355e;
            --accent-dark: #3d2242;
            --accent-light: #e8f0df;
            --accent-mid: #8b6292;
            --green: #c4d6b0;
            --green-dark: #9ab88a;
            --green-light: #edf4e6;
            --muted: #7a6e7d;
            --border: #dce8d0;
            --card-bg: #ffffff;
            --shadow-sm: 0 1px 4px rgba(88,53,94,0.07);
            --shadow-md: 0 4px 20px rgba(88,53,94,0.12);
            --shadow-lg: 0 12px 40px rgba(88,53,94,0.18);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: var(--paper); color: var(--ink); font-family: 'Noto Sans KR', sans-serif; }
        .app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        .header { display: none; background: #f5f9f0; border-bottom: 1px solid var(--border); padding: 0 20px; height: 56px; align-items: center; justify-content: space-between; z-index: 100; flex-shrink: 0; }
        .header.visible { display: flex; }
        .header-logo { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 22px; letter-spacing: -0.5px; color: var(--ink); }
        .header-logo span { color: var(--accent); }
        .header-actions { display: flex; gap: 8px; }
        .btn-pill { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--card-bg); color: var(--ink); font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: 'Noto Sans KR', sans-serif; }
        .btn-pill:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
        .btn-pill.accent { background: var(--green); color: var(--accent); border-color: var(--green); }
        .btn-pill.accent:hover { background: var(--green-dark); border-color: var(--green-dark); }

        .main { flex: 1; overflow: hidden; position: relative; }
        .page { display: none; width: 100%; height: 100%; position: absolute; inset: 0; flex-direction: column; overflow: hidden; }
        .page.active { display: flex; }

        /* AUTH */
        #authPage { align-items: center; justify-content: center; padding: 24px; background: linear-gradient(160deg, #2e1a33 0%, #58355e 55%, #7a4d82 100%); }
        .auth-inner { width: 100%; max-width: 380px; }
        .auth-logo { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 52px; color: var(--paper); letter-spacing: -2px; line-height: 1; margin-bottom: 4px; }
        .auth-logo span { color: var(--green); }
        .auth-tagline { color: rgba(255,255,255,0.5); font-size: 12px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 36px; }
        .auth-card { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; padding: 24px; backdrop-filter: blur(12px); }
        .auth-tabs { display: flex; gap: 4px; background: rgba(255,255,255,0.07); border-radius: 12px; padding: 4px; margin-bottom: 20px; }
        .auth-tab { flex: 1; padding: 9px; border: none; background: transparent; color: rgba(255,255,255,0.5); cursor: pointer; border-radius: 9px; font-weight: 600; font-size: 13px; transition: all 0.2s; font-family: 'Noto Sans KR', sans-serif; }
        .auth-tab.active { background: var(--green); color: var(--accent); }
        .auth-form-content { display: none; }
        .auth-form-content.active { display: block; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.5); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
        .form-group input, .form-group select { width: 100%; padding: 11px 14px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; font-size: 13px; color: #fff; font-family: 'Noto Sans KR', sans-serif; transition: border-color 0.2s; }
        .form-group input::placeholder { color: rgba(255,255,255,0.3); }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--green); }
        .form-group select option { background: #58355e; color: #fff; }
        .btn-auth { width: 100%; padding: 13px; background: var(--green); color: var(--accent); border: none; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 8px; font-family: 'Noto Sans KR', sans-serif; transition: background 0.2s; }
        .btn-auth:hover { background: var(--green-dark); }
        .auth-demo { margin-top: 12px; text-align: center; font-size: 11px; color: rgba(255,255,255,0.35); }
        .auth-demo button { background: none; border: none; color: var(--green); cursor: pointer; font-size: 11px; font-family: 'Noto Sans KR', sans-serif; }

        /* MAP */
        #mapPage { position: relative; }
        .map-search-bar { position: absolute; top: 12px; left: 12px; right: 12px; z-index: 500; display: flex; gap: 8px; }
        .map-search-input { flex: 1; padding: 11px 16px; border-radius: 24px; border: none; background: white; box-shadow: var(--shadow-md); font-size: 13px; font-family: 'Noto Sans KR', sans-serif; }
        .map-search-input:focus { outline: none; }
        .map-filter-btn { padding: 11px 14px; border-radius: 20px; border: none; background: white; box-shadow: var(--shadow-md); cursor: pointer; font-size: 12px; font-weight: 600; color: var(--ink); font-family: 'Noto Sans KR', sans-serif; transition: all 0.2s; white-space: nowrap; }
        .map-filter-btn.active-filter { background: var(--accent); color: var(--green); }
        #map { width: 100%; height: 100%; }

        /* BOTTOM SHEET */
        .bottom-sheet { position: absolute; bottom: 0; left: 0; right: 0; background: #f5f9f0; border-radius: 20px 20px 0 0; max-height: 55vh; overflow-y: auto; z-index: 400; box-shadow: 0 -8px 30px rgba(88,53,94,0.14); transform: translateY(0); transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1); }
        .bottom-sheet.hidden { transform: translateY(110%); pointer-events: none; }
        .bs-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }
        .bs-content { padding: 14px 16px 24px; }
        .bs-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .bs-title { font-size: 14px; font-weight: 700; }
        .bs-count { font-size: 12px; color: var(--muted); }

        /* EXHIBITION CARD */
        .ex-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s; display: flex; gap: 12px; align-items: flex-start; }
        .ex-card:hover { box-shadow: var(--shadow-md); border-color: var(--green-dark); transform: translateY(-1px); }
        .ex-card-icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
        .ex-card-icon.student { background: var(--green-light); }
        .ex-card-icon.graduation { background: var(--accent-light); }
        .ex-card-body { flex: 1; min-width: 0; }
        .ex-card-badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 9px; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 5px; }
        .badge-student { background: var(--green-light); color: #4a6e35; }
        .badge-graduation { background: var(--accent-light); color: var(--accent); }
        .ex-card-title { font-size: 13px; font-weight: 700; color: var(--ink); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ex-card-meta { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
        .ex-card-rating { font-size: 11px; font-weight: 600; color: var(--accent); }

        /* BOTTOM NAV */
        .bottom-nav { display: none; background: #f5f9f0; border-top: 1px solid var(--border); height: 60px; flex-shrink: 0; z-index: 300; }
        .bottom-nav.visible { display: flex; }
        .nav-inner { display: flex; width: 100%; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; border: none; background: none; color: var(--muted); font-size: 10px; font-weight: 500; padding: 8px 0; font-family: 'Noto Sans KR', sans-serif; transition: color 0.2s; position: relative; }
        .nav-item.active { color: var(--accent); font-weight: 700; }
        .nav-item.active::after { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 24px; height: 2px; background: var(--green); border-radius: 0 0 2px 2px; }
        .nav-icon { width: 22px; height: 22px; }

        .scroll-page { flex: 1; overflow-y: auto; padding: 16px; }

        /* CALENDAR */
        .section-header { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; margin-bottom: 16px; color: var(--ink); }
        .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
        .cal-month { font-size: 16px; font-weight: 700; }
        .cal-nav-btn { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 12px; color: var(--ink); font-family: 'Noto Sans KR', sans-serif; transition: all 0.2s; }
        .cal-nav-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 16px; }
        .cal-day-header { text-align: center; font-size: 10px; font-weight: 700; color: var(--muted); padding: 4px 0; letter-spacing: 0.5px; }
        .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px; font-size: 11px; color: var(--ink); cursor: pointer; border: 1px solid transparent; transition: all 0.15s; position: relative; gap: 2px; }
        .cal-day:hover { border-color: var(--accent); background: var(--accent-light); }
        .cal-day.has-event { background: var(--green-light); color: #3a5528; font-weight: 700; }
        .cal-dots { display: flex; gap: 2px; }
        .cal-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--green-dark); }
        .cal-dot.grad { background: var(--accent-mid); }
        .cal-day.today { background: var(--accent); color: #fff; font-weight: 700; }
        .cal-day.today .cal-dot { background: var(--green); }
        .cal-day.selected { border: 2px solid var(--accent); }
        .cal-day.today.selected { border: 2px solid var(--green); }
        .cal-events-title { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 10px; letter-spacing: 0.5px; text-transform: uppercase; }

        /* POPULAR */
        .pop-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 14px; }
        .pop-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
        .pop-rank { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 900; color: var(--border); line-height: 1; min-width: 40px; }
        .pop-rank.top { color: var(--green-dark); }
        .pop-body { flex: 1; min-width: 0; }
        .pop-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .pop-meta { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
        .pop-rating { font-size: 12px; font-weight: 700; color: var(--accent); }

        /* DETAIL */
        #detailPage { overflow-y: auto; }
        .detail-scroll { padding: 16px; padding-bottom: 32px; }
        .back-btn { background: none; border: none; color: var(--muted); font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; padding: 0; margin-bottom: 14px; display: flex; align-items: center; gap: 4px; transition: color 0.2s; }
        .back-btn:hover { color: var(--accent); }
        .detail-hero { border-radius: 16px; padding: 20px; margin-bottom: 16px; position: relative; overflow: hidden; }
        .detail-hero::before { content: '🎨'; position: absolute; right: 16px; bottom: -8px; font-size: 80px; opacity: 0.12; }
        .detail-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; margin-bottom: 10px; }
        .detail-badge.student { background: rgba(196,214,176,0.3); color: #c4d6b0; }
        .detail-badge.graduation { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.85); }
        .detail-title-text { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: #fff; line-height: 1.3; margin-bottom: 12px; }
        .detail-meta-row { display: flex; gap: 16px; }
        .detail-meta-item { font-size: 11px; color: rgba(255,255,255,0.6); }
        .detail-meta-item strong { color: rgba(255,255,255,0.9); display: block; font-size: 12px; margin-top: 2px; }
        .detail-desc { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 16px; font-size: 13px; line-height: 1.7; color: #555; }
        .detail-section-title { font-size: 13px; font-weight: 700; color: var(--ink); margin-bottom: 10px; }

        /* RATING */
        .rating-stars { display: flex; gap: 6px; margin-bottom: 10px; }
        .star { font-size: 26px; cursor: pointer; opacity: 0.2; transition: opacity 0.15s, transform 0.15s; color: var(--accent); }
        .star:hover, .star.filled { opacity: 1; transform: scale(1.1); }
        .rating-textarea { width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: 10px; font-size: 13px; color: var(--ink); font-family: 'Noto Sans KR', sans-serif; min-height: 70px; resize: none; margin-bottom: 10px; }
        .rating-textarea:focus { outline: none; border-color: var(--accent); }
        .btn-submit { background: var(--accent); color: #fff; border: none; padding: 12px 24px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; width: 100%; font-family: 'Noto Sans KR', sans-serif; transition: background 0.2s; }
        .btn-submit:hover { background: var(--accent-dark); }
        .comment-item { background: var(--green-light); border: 1px solid var(--border); border-radius: 10px; padding: 11px 13px; margin-bottom: 8px; }
        .comment-stars { font-size: 11px; color: var(--accent); font-weight: 700; margin-bottom: 3px; }
        .comment-text { font-size: 12px; color: #555; line-height: 1.5; }

        /* MY PAGE */
        .profile-card { background: linear-gradient(135deg, #2e1a33 0%, #58355e 100%); border-radius: 16px; padding: 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 14px; }
        .profile-avatar { width: 50px; height: 50px; background: var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; color: var(--accent); font-weight: 700; font-family: 'Playfair Display', serif; flex-shrink: 0; }
        .profile-name { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 3px; }
        .profile-school { font-size: 12px; color: rgba(255,255,255,0.6); }
        .section-block { margin-bottom: 20px; }
        .section-block-title { font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
        .btn-logout { width: 100%; padding: 12px; border: 1px solid var(--border); background: var(--card-bg); color: var(--ink); border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; transition: all 0.2s; }
        .btn-logout:hover { background: #fee2e2; border-color: #fca5a5; color: #dc2626; }

        /* MODAL */
        .modal { display: none; position: fixed; inset: 0; background: rgba(46,26,51,0.6); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-box { background: var(--paper); border-radius: 20px; width: 100%; max-width: 400px; max-height: 85vh; overflow-y: auto; }
        .modal-header { padding: 18px 18px 0; display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .modal-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; }
        .modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--muted); padding: 0; line-height: 1; }
        .modal-body { padding: 0 18px 24px; }
        .modal .form-group label { color: var(--muted); font-weight: 700; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; }
        .modal .form-group input, .modal .form-group select, .modal .form-group textarea { background: var(--card-bg); border: 1px solid var(--border); color: var(--ink); border-radius: 10px; padding: 10px 13px; font-family: 'Noto Sans KR', sans-serif; }
        .modal .form-group input::placeholder { color: var(--muted); }
        .modal .form-group input:focus, .modal .form-group select:focus, .modal .form-group textarea:focus { outline: none; border-color: var(--accent); }
        .modal .form-group select option { background: var(--paper); color: var(--ink); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-modal-submit { width: 100%; padding: 13px; background: var(--green); color: var(--accent); border: none; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; margin-top: 6px; transition: background 0.2s; }
        .btn-modal-submit:hover { background: var(--green-dark); }

        .empty-state { text-align: center; padding: 24px; color: var(--muted); font-size: 12px; }
        .empty-state .big { font-size: 32px; margin-bottom: 8px; }
        /* Leaflet 마커 기본 흰 박스 제거 */
        .leaflet-div-icon { background: transparent !important; border: none !important; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--green); border-radius: 2px; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .slide-up { animation: slideUp 0.3s ease forwards; }
    </style>
</head>
<body>
<div class="app">
    <div class="header" id="header">
        <div class="header-logo">ART<span>HERE</span></div>
        <div class="header-actions">
            <button class="btn-pill accent" id="headerAddBtn">＋ 등록</button>
            <button class="btn-pill" id="headerMyBtn">내 정보</button>
        </div>
    </div>

    <div class="main">
        <!-- AUTH -->
        <div class="page active" id="authPage">
            <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(160deg,#2e1a33 0%,#58355e 55%,#7a4d82 100%);">
                <div class="auth-inner">
                    <div class="auth-logo">ART<span>HERE</span></div>
                    <div class="auth-tagline">대학생 전시 탐색 플랫폼</div>
                    <div class="auth-card">
                        <div class="auth-tabs">
                            <button class="auth-tab active" data-tab="login">로그인</button>
                            <button class="auth-tab" data-tab="signup">회원가입</button>
                        </div>
                        <div class="auth-form-content active" id="loginForm">
                            <div class="form-group"><label>이메일</label><input type="email" id="loginEmail" placeholder="your@email.com"></div>
                            <div class="form-group"><label>비밀번호</label><input type="password" id="loginPassword" placeholder="••••••••"></div>
                            <button class="btn-auth" id="loginBtn">로그인</button>
                            <div class="auth-demo">계정이 없으신가요? <button onclick="demoLogin()">데모로 입장</button></div>
                        </div>
                        <div class="auth-form-content" id="signupForm">
                            <div class="form-group"><label>사용자명</label><input type="text" id="signupUsername" placeholder="당신의 이름"></div>
                            <div class="form-group"><label>이메일</label><input type="email" id="signupEmail" placeholder="your@email.com"></div>
                            <div class="form-group"><label>비밀번호</label><input type="password" id="signupPassword" placeholder="••••••••"></div>
                            <div class="form-group"><label>학교</label><input type="text" id="signupSchool" placeholder="예: 국민대학교"></div>
                            <div class="form-group"><label>학과</label><input type="text" id="signupMajor" placeholder="예: 시각디자인학과"></div>
                            <button class="btn-auth" id="signupBtn">회원가입</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- MAP -->
        <div class="page" id="mapPage" style="position:relative;">
            <div class="map-search-bar">
                <input type="text" class="map-search-input" id="locationInput" placeholder="🔍  위치 또는 전시명 검색">
                <button class="map-filter-btn active-filter" id="filterAll" onclick="setFilter('all')">전체</button>
                <button class="map-filter-btn" id="filterStudent" onclick="setFilter('student')">기획</button>
                <button class="map-filter-btn" id="filterGrad" onclick="setFilter('graduation')">졸전</button>
            </div>
            <div id="map" style="width:100%;height:100%;"></div>
            <div class="bottom-sheet hidden" id="bottomSheet">
                <div class="bs-handle"></div>
                <div class="bs-content">
                    <div class="bs-header">
                        <div class="bs-title" id="bsTitle">근처 전시</div>
                        <div class="bs-count" id="bsCount"></div>
                    </div>
                    <div id="sheetExhibitions"></div>
                </div>
            </div>
        </div>

        <!-- CALENDAR -->
        <div class="page" id="calendarPage">
            <div class="scroll-page">
                <div class="section-header">전시 캘린더</div>
                <div style="background:var(--card-bg);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:16px;">
                    <div class="cal-nav">
                        <button class="cal-nav-btn" id="prevMonthBtn">◀</button>
                        <div class="cal-month" id="calendarMonth"></div>

    function demoLogin() {
        currentUser = { id: 1, username: '방문자', email: 'demo@arthere.kr', school: '서울대학교', major: '미술학과' };

    function showPage(name) {
        if (name !== 'authPage' && name !== 'detailPage') previousPage = name;
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(name).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        const nav = document.querySelector(`[data-page="${name}"]`);
        if (nav) nav.classList.add('active');
        if (name === 'authPage') {
            document.getElementById('header').classList.remove('visible');
            document.getElementById('bottomNav').classList.remove('visible');
        } else {
            document.getElementById('header').classList.add('visible');
            document.getElementById('bottomNav').classList.add('visible');
        }
        if (name === 'mapPage') setTimeout(initMap, 100);
        if (name === 'calendarPage') initCalendar();
        if (name === 'popularPage') populateRecommendations();
        if (name === 'myPage') loadMyPage();
        document.getElementById('bottomSheet').classList.add('hidden');
    }

    function login() {
        const email = document.getElementById('loginEmail').value;
        const pw = document.getElementById('loginPassword').value;
        const user = users.find(u => u.email === email && u.password === pw);
        if (user) { currentUser = user; localStorage.setItem('currentUser', JSON.stringify(user)); showPage('mapPage'); }
        else alert('이메일 또는 비밀번호가 잘못되었습니다.');
    }

    function signup() {
        const username = document.getElementById('signupUsername').value;
        const email = document.getElementById('signupEmail').value;
        const password = document.getElementById('signupPassword').value;
        const school = document.getElementById('signupSchool').value;
        const major = document.getElementById('signupMajor').value;
        if (!username || !email || !password) { alert('필수 항목을 입력해주세요.'); return; }
        if (users.find(u => u.email === email)) { alert('이미 존재하는 이메일입니다.'); return; }
        const newUser = { id: Date.now(), username, email, password, school: school||'미입력', major: major||'미입력' };
        users.push(newUser);
        localStorage.setItem('users', JSON.stringify(users));
        currentUser = newUser;
        localStorage.setItem('currentUser', JSON.stringify(newUser));
        showPage('mapPage');
    }

    function logout() { currentUser = null; localStorage.removeItem('currentUser'); showPage('authPage'); }

    // MAP — OpenStreetMap 표준 타일 (한국어 지명 포함)
    function setFilter(f) {
        currentFilter = f;
        document.querySelectorAll('.map-filter-btn').forEach(b => b.classList.remove('active-filter'));
        ({ all: 'filterAll', student: 'filterStudent', graduation: 'filterGrad' });
        document.getElementById({ all: 'filterAll', student: 'filterStudent', graduation: 'filterGrad' }[f]).classList.add('active-filter');
        initMap();
    }

    function initMap() {
        const mapDiv = document.getElementById('map');
        if (!mapDiv) return;
        if (map) { map.remove(); map = null; }
        map = L.map('map', { zoomControl: false }).setView([37.5665, 126.9780], 11);
        // OpenStreetMap 기본 타일 — 서울/한국 지역에서 한국어 지명 표기
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 19
        }).addTo(map);
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        markers.forEach(m => m.remove());
        markers = [];
        const filtered = currentFilter === 'all' ? exhibitions : exhibitions.filter(e => e.type === currentFilter);
        filtered.forEach(ex => {
            const isStudent = ex.type === 'student';
            const color = isStudent ? '#58355e' : '#3d2242';
            const bgOuter = isStudent ? '#c4d6b0' : '#e8d5eb';
            const emoji = isStudent ? '🎨' : '🎓';
            const marker = L.marker([ex.lat, ex.lng], {
                icon: L.divIcon({
                    html: `<div style="background:${color};color:white;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:16px;border:3px solid ${bgOuter};box-shadow:0 3px 10px rgba(88,53,94,0.35);">${emoji}</div>`,
                    iconSize: [36, 36],
                    iconAnchor: [18, 18],
                    className: ''
                })
            }).addTo(map);
            marker.on('click', () => showNearby(ex.lat, ex.lng));
            markers.push(marker);
        });
    }

    function showNearby(lat, lng) {
        const nearby = exhibitions.filter(ex => {
            if (currentFilter !== 'all' && ex.type !== currentFilter) return false;
            return Math.sqrt(Math.pow(ex.lat - lat, 2) + Math.pow(ex.lng - lng, 2)) < 0.05;
        });
        const sheet = document.getElementById('sheetExhibitions');
        sheet.innerHTML = '';
        document.getElementById('bsCount').textContent = `${nearby.length}개`;
        nearby.forEach(ex => {
            const exR = ratings.filter(r => r.exhibitionId === ex.id);
            const avg = exR.length > 0 ? (exR.reduce((s,r)=>s+r.rating,0)/exR.length).toFixed(1) : null;
            const card = document.createElement('div'); card.className = 'ex-card slide-up';
            card.innerHTML = `<div class="ex-card-icon ${ex.type}"><span>${ex.type==='student'?'🎨':'🎓'}</span></div><div class="ex-card-body"><span class="ex-card-badge ${ex.type==='student'?'badge-student':'badge-graduation'}">${ex.type==='student'?'대학생 기획':'졸업전시'}</span><div class="ex-card-title">${ex.title}</div><div class="ex-card-meta">📍 ${ex.location}</div><div class="ex-card-meta">📅 ${ex.startDate} ~ ${ex.endDate}</div>${avg?`<div class="ex-card-rating">⭐ ${avg} (${exR.length}명)</div>`:''}</div>`;
            card.addEventListener('click', () => showDetail(ex.id));
            sheet.appendChild(card);
        });
        document.getElementById('bottomSheet').classList.remove('hidden');
    }

    function showDetail(id) {
        const ex = exhibitions.find(e => e.id === id);
        if (!ex) return;
        currentExhibitionId = ex.id;
        const isStudent = ex.type === 'student';
        document.getElementById('detailHero').style.background = isStudent
            ? 'linear-gradient(135deg, #3a5528 0%, #6a8f52 100%)'
            : 'linear-gradient(135deg, #2e1a33 0%, #58355e 100%)';
        document.getElementById('detailBadge').textContent = isStudent ? '대학생 기획 전시' : '졸업 전시';
        document.getElementById('detailBadge').className = `detail-badge ${ex.type}`;
        document.getElementById('detailTitle').textContent = ex.title;
        document.getElementById('detailLocation').textContent = ex.location;
        document.getElementById('detailDate').textContent = `${ex.startDate} ~ ${ex.endDate}`;
        document.getElementById('detailDescription').textContent = ex.description;
        const ratingInput = document.getElementById('ratingInput');
        ratingInput.innerHTML = '';
        for (let i = 1; i <= 5; i++) {
            const s = document.createElement('span'); s.className = 'star'; s.textContent = '★'; s.dataset.rating = i;
            s.addEventListener('click', () => document.querySelectorAll('#ratingInput .star').forEach((st, idx) => st.classList.toggle('filled', idx < i)));
            ratingInput.appendChild(s);
        }
        loadComments(ex.id);
        showPage('detailPage');
    }

    function loadComments(id) {
        const exR = ratings.filter(r => r.exhibitionId === id);
        document.getElementById('ratingCount').textContent = exR.length;
        const list = document.getElementById('commentsList'); list.innerHTML = '';
        if (exR.length === 0) { list.innerHTML = '<div class="empty-state"><div class="big">✍️</div>첫 리뷰를 남겨주세요!</div>'; return; }
        exR.forEach(r => {
            const el = document.createElement('div'); el.className = 'comment-item';
            el.innerHTML = `<div class="comment-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)} ${r.rating}점</div><div class="comment-text">${r.comment}</div>`;
            list.appendChild(el);
        });
    }

    // CALENDAR — 날짜 클릭 시 해당 날의 전시 표시, 점(dot)으로 이벤트 표시
    function initCalendar() {
        const firstDay = new Date(currentCalendarYear, currentCalendarMonth, 1).getDay();
        const daysInMonth = new Date(currentCalendarYear, currentCalendarMonth + 1, 0).getDate();
        document.getElementById('calendarMonth').textContent = `${currentCalendarYear}년 ${currentCalendarMonth + 1}월`;
        const grid = document.getElementById('calendarGrid'); grid.innerHTML = '';
        ['일','월','화','수','목','금','토'].forEach(d => {
            const el = document.createElement('div'); el.className = 'cal-day-header'; el.textContent = d; grid.appendChild(el);
        });
        for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));
        const today = new Date();
        const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

        for (let day = 1; day <= daysInMonth; day++) {
            const el = document.createElement('div'); el.className = 'cal-day';
            const dateStr = `${currentCalendarYear}-${String(currentCalendarMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
            const dayExhibitions = exhibitions.filter(ex => dateStr >= ex.startDate && dateStr <= ex.endDate);

            const numEl = document.createElement('span'); numEl.textContent = day; el.appendChild(numEl);

            if (dayExhibitions.length > 0) {
                el.classList.add('has-event');
                const dots = document.createElement('div'); dots.className = 'cal-dots';
                const maxDots = Math.min(dayExhibitions.length, 3);
                for (let d = 0; d < maxDots; d++) {
                    const dot = document.createElement('div');
                    dot.className = 'cal-dot' + (dayExhibitions[d].type === 'graduation' ? ' grad' : '');
                    dots.appendChild(dot);
                }
                el.appendChild(dots);
            }
            if (dateStr === todayStr) el.classList.add('today');
            if (dateStr === selectedCalDate) el.classList.add('selected');

            el.addEventListener('click', () => {
                selectedCalDate = dateStr;
                document.querySelectorAll('.cal-day.selected').forEach(d => d.classList.remove('selected'));
                el.classList.add('selected');
                showCalendarEvents(dateStr);
            });
            grid.appendChild(el);
        }
        const initDate = selectedCalDate || todayStr;
        showCalendarEvents(initDate);
    }

    function showCalendarEvents(dateStr) {
        const [year, month, day] = dateStr.split('-');
        const dayEx = exhibitions.filter(ex => dateStr >= ex.startDate && dateStr <= ex.endDate);
        const today = new Date();
        const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
        const isToday = dateStr === todayStr;
        document.getElementById('calEventsTitle').textContent =
            `${parseInt(month)}월 ${parseInt(day)}일${isToday ? ' (오늘)' : ''} · 진행 중인 전시 ${dayEx.length}개`;
        const list = document.getElementById('calendarEventsList'); list.innerHTML = '';
        if (dayEx.length === 0) {
            list.innerHTML = '<div class="empty-state"><div class="big">📅</div>이 날짜에 예정된 전시가 없습니다.</div>';
            return;
        }
        dayEx.forEach(ex => {
            const exR = ratings.filter(r => r.exhibitionId === ex.id);
            const avg = exR.length > 0 ? (exR.reduce((s,r)=>s+r.rating,0)/exR.length).toFixed(1) : null;
            const card = document.createElement('div'); card.className = 'ex-card slide-up';
            card.innerHTML = `<div class="ex-card-icon ${ex.type}"><span>${ex.type==='student'?'🎨':'🎓'}</span></div><div class="ex-card-body"><span class="ex-card-badge ${ex.type==='student'?'badge-student':'badge-graduation'}">${ex.type==='student'?'대학생 기획':'졸업전시'}</span><div class="ex-card-title">${ex.title}</div><div class="ex-card-meta">📍 ${ex.location}</div><div class="ex-card-meta">📅 ${ex.startDate} ~ ${ex.endDate}</div>${avg?`<div class="ex-card-rating">⭐ ${avg} (${exR.length}명)</div>`:''}</div>`;
            card.addEventListener('click', () => showDetail(ex.id));
            list.appendChild(card);
        });
    }

    function populateRecommendations() {
        const scored = exhibitions.map(ex => {
            const exR = ratings.filter(r => r.exhibitionId === ex.id);
            const avg = exR.length > 0 ? exR.reduce((s,r)=>s+r.rating,0)/exR.length : 0;
            return { ...ex, avg, count: exR.length };
        }).sort((a,b) => b.avg - a.avg);
        const list = document.getElementById('popularList'); list.innerHTML = '';
        scored.slice(0,12).forEach((ex, idx) => {
            const card = document.createElement('div'); card.className = 'pop-card slide-up';
            card.innerHTML = `<div class="pop-rank ${idx < 3 ? 'top' : ''}">${idx+1}</div><div class="pop-body"><span class="ex-card-badge ${ex.type==='student'?'badge-student':'badge-graduation'}">${ex.type==='student'?'대학생 기획':'졸업전시'}</span><div class="pop-title">${ex.title}</div><div class="pop-meta">📍 ${ex.location}</div><div class="pop-rating">⭐ ${ex.avg.toFixed(1)} · ${ex.count}명 평가</div></div>`;
            card.addEventListener('click', () => showDetail(ex.id));
            list.appendChild(card);
        });
    }

    function loadMyPage() {
        if (!currentUser) { showPage('authPage'); return; }
        document.getElementById('profileName').textContent = currentUser.username;
        document.getElementById('profileSchool').textContent = `${currentUser.school} · ${currentUser.major}`;
        document.getElementById('profileAvatar').textContent = currentUser.username[0].toUpperCase();
        const myR = ratings.filter(r => r.userId === currentUser.id);
        const list = document.getElementById('myCommentsList'); list.innerHTML = '';
        if (myR.length === 0) { list.innerHTML = '<div class="empty-state"><div class="big">✍️</div>아직 남긴 평가가 없습니다.</div>'; return; }
        myR.forEach(c => {
            const ex = exhibitions.find(e => e.id === c.exhibitionId); if (!ex) return;
            const card = document.createElement('div'); card.className = 'comment-item';
            card.innerHTML = `<div style="font-size:12px;font-weight:700;margin-bottom:4px;">${ex.title}</div><div class="comment-stars">${'★'.repeat(c.rating)} ${c.rating}점</div><div class="comment-text">"${c.comment}"</div>`;
            list.appendChild(card);
        });
    }

                title: document.getElementById('exhibitionTitle').value,
                type: document.getElementById('exhibitionType').value,
                location: document.getElementById('exhibitionLocation').value,
                lat: parseFloat(document.getElementById('exhibitionLat').value),
                lng: parseFloat(document.getElementById('exhibitionLng').value),
                startDate: document.getElementById('exhibitionStartDate').value,
                endDate: document.getElementById('exhibitionEndDate').value,
                description: document.getElementById('exhibitionDescription').value
            };
            exhibitions.push(newEx);
            localStorage.setItem('exhibitions', JSON.stringify(exhibitions));
            document.getElementById('addExhibitionForm').reset();
            document.getElementById('addExhibitionModal').classList.remove('active');
            alert('전시가 등록되었습니다!');
            initMap();
        });
        document.getElementById('prevMonthBtn').addEventListener('click', () => { currentCalendarMonth--; if (currentCalendarMonth < 0) { currentCalendarMonth = 11; currentCalendarYear--; } selectedCalDate = null; initCalendar(); });
        document.getElementById('nextMonthBtn').addEventListener('click', () => { currentCalendarMonth++; if (currentCalendarMonth > 11) { currentCalendarMonth = 0; currentCalendarYear++; } selectedCalDate = null; initCalendar(); });
        document.getElementById('submitRatingBtn').addEventListener('click', () => {
            if (!currentUser) { alert('로그인 후 평가할 수 있습니다.'); return; }
            const rating = document.querySelectorAll('#ratingInput .star.filled').length;
            const comment = document.getElementById('commentInput').value;
            if (rating === 0) { alert('별점을 선택해주세요.'); return; }
            ratings.push({ id: Date.now(), exhibitionId: currentExhibitionId, userId: currentUser.id, rating, comment: comment || '좋은 전시였습니다.' });
            localStorage.setItem('ratings', JSON.stringify(ratings));
            document.getElementById('commentInput').value = '';
            document.querySelectorAll('#ratingInput .star').forEach(s => s.classList.remove('filled'));
            loadComments(currentExhibitionId);
        });
        let touchStartY = 0;
        const bs = document.getElementById('bottomSheet');
        bs.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; });
        bs.addEventListener('touchend', e => { if (e.changedTouches[0].clientY - touchStartY > 60) bs.classList.add('hidden'); });
    });
</script>
</body>
</html>
